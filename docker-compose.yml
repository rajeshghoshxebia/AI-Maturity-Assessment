services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_maturity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@db:5432/ai_maturity
      SECRET_KEY: dev-secret-key-change-in-production-32chars!!
      AZURE_TENANT_ID: ""
      APP_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
